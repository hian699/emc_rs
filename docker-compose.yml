services:
  bot:
    image: ${BOT_IMAGE:-docker.io/your-dockerhub-username/emc-rs:latest}
    platform: linux/arm64
    container_name: emc-rs-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SQLITE_DATABASE_URL: sqlite:///data/bot_config.db
      LAVALINK_HOST: "${LAVALINK_HOST:-lavalink:2333}"
      LAVALINK_PASSWORD: "${LAVALINK_SERVER_PASSWORD:-youshallnotpass}"
      RUST_LOG: "${RUST_LOG:-emc_rs=debug,warn}"
    volumes:
      - bot_data:/data
    depends_on:
      - lavalink
    networks:
      - dokploy-network

  fix-perms:
    image: busybox:1.36
    platform: linux/arm64
    command: >
      sh -c "mkdir -p /opt/Lavalink/plugins &&
             chmod -R 0777 /opt/Lavalink/plugins || true &&
             chown -R 1000:1000 /opt/Lavalink/plugins || true &&
             echo perms-fixed && sleep 1"
    volumes:
      - "./files/plugins/:/opt/Lavalink/plugins/"
      - "./files/application.yml:/opt/Lavalink/application.yml"
    restart: "no"

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.2
    platform: linux/arm64
    depends_on:
      - fix-perms
    container_name: emc-rs-lavalink
    restart: unless-stopped
    environment:
      _JAVA_OPTIONS: "${_JAVA_OPTIONS:--Xmx6G}"
      LAVALINK_SERVER_PASSWORD: "${LAVALINK_SERVER_PASSWORD:-youshallnotpass}"
      SERVER_PORT: "${SERVER_PORT:-2333}"
    volumes:
      - "./files/application.yml:/opt/Lavalink/application.yml:rw"
      - "./files/plugins/:/opt/Lavalink/plugins/:rw"
    ports:
      - "${SERVER_PORT:-2333}:${SERVER_PORT:-2333}"
    healthcheck:
      test: >
        sh -c 'wget --header="Authorization: ${LAVALINK_SERVER_PASSWORD}" -qO- http://127.0.0.1:${SERVER_PORT}/v4/info >/dev/null 2>&1 || exit 1'
      interval: 100s
      timeout: 5s
      retries: 5
      start_period: 30s
    entrypoint: >
      sh -c 'until [ -w /opt/Lavalink/plugins ] ; do
                echo "waiting for /opt/Lavalink/plugins to be writable";
                sleep 1;
             done;
             exec java -jar /opt/Lavalink/Lavalink.jar'
    networks:
      dokploy-network:
        aliases:
          - lavalink

volumes:
  bot_data:

networks:
  dokploy-network:
    external: true
