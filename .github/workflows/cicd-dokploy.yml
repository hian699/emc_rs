name: CI/CD Dokploy

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/emc-rs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    outputs:
      image_ref: ${{ steps.export.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export deploy image ref
        id: export
        run: echo "image_ref=${{ env.IMAGE_NAME }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy-dokploy:
    runs-on: ubuntu-latest
    environment: prod
    needs: build-and-push
    if: ${{ needs.build-and-push.result == 'success' }}
    steps:
      - name: Trigger Dokploy deployment
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
        run: |
          set -euo pipefail

          if [ -z "${DOKPLOY_WEBHOOK_URL:-}" ]; then
            echo "Missing Dokploy secret: DOKPLOY_WEBHOOK_URL"
            exit 1
          fi

          echo "Deploying image: ${IMAGE_REF}"

          code=$(curl -sS -o /tmp/dokploy-response.txt -w "%{http_code}" \
            -X GET "${DOKPLOY_WEBHOOK_URL}")

          cat /tmp/dokploy-response.txt || true
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "Dokploy webhook trigger failed with HTTP ${code}"
            exit 1
          fi
